<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego de las Sobrinas</title>
<style>
  body {
    margin: 0;
    background: #222;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    user-select: none;
  }
  h1 { color: #fff; margin-bottom: 8px; font-size: 1.5em; }
  #hud {
    color: #fff;
    font-size: 1.2em;
    margin-bottom: 10px;
    display: flex;
    gap: 30px;
  }
  #selector {
    color: #fff;
    margin-bottom: 10px;
    font-size: 0.95em;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  #selector select {
    padding: 3px 8px;
    border-radius: 6px;
    border: none;
    font-size: 0.9em;
  }
  canvas {
    display: block;
    border: 4px solid #555;
    border-radius: 8px;
    cursor: default;
  }
  #msg {
    color: #ffeb3b;
    font-size: 1.3em;
    margin-top: 10px;
    height: 1.5em;
    font-weight: bold;
  }
  button {
    margin-top: 10px;
    padding: 8px 20px;
    font-size: 1em;
    border: none;
    border-radius: 8px;
    background: #e53935;
    color: white;
    cursor: pointer;
    font-weight: bold;
  }
  button:hover { background: #c62828; }
</style>
</head>
<body>
<h1>🐭 El Juego de las Sobrinas 🧀</h1>
<div id="selector">
  <label>🐭 Ratón:
    <select id="selMouse" onchange="init()">
      <option value="A">Sobrina 1 🦄</option>
      <option value="B">Sobrina 2 🎀</option>
    </select>
  </label>
  <label>🧀 Queso:
    <select id="selCheese" onchange="init()">
      <option value="B">Sobrina 2 🎀</option>
      <option value="A">Sobrina 1 🦄</option>
    </select>
  </label>
</div>
<div id="hud">
  <span>🏆 Puntos: <b id="pts">0</b></span>
  <span>⏱ Tiempo: <b id="tim">60</b>s</span>
</div>
<canvas id="c" width="624" height="520"></canvas>
<div id="msg"></div>
<button onclick="init()">🔄 Reiniciar</button>

const imgs = {};
['A','B'].forEach(k => {
  const im = new Image();
  im.src = imgData[k];
  imgs[k] = im;
});

// Tile colors (like ceramic tiles)
const TILE1 = '#c8a96e';
const TILE2 = '#b8956a';
const GROUT = '#8a7060';

let player, cheese, score, timeLeft, timer, alive, mouseKey, cheeseKey, nomTimer;

function rnd(exclude) {
  let p;
  do {
    p = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
  } while (p.x === exclude.x && p.y === exclude.y);
  return p;
}

function init() {
  mouseKey  = document.getElementById('selMouse').value;
  cheeseKey = document.getElementById('selCheese').value;
  score = 0;
  timeLeft = 60;
  alive = true;
  player = { x: 0, y: 0 };
  cheese = rnd(player);
  document.getElementById('pts').textContent = 0;
  document.getElementById('tim').textContent = 60;
  document.getElementById('msg').textContent = '';
  clearInterval(timer);
  timer = setInterval(() => {
    if (!alive) return;
    timeLeft--;
    document.getElementById('tim').textContent = timeLeft;
    if (timeLeft <= 0) {
      alive = false;
      clearInterval(timer);
      document.getElementById('msg').textContent = '⏰ ¡Se acabó el tiempo! Puntos: ' + score;
    }
  }, 1000);
  draw();
}

function drawTiles() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * CELL, y = r * CELL;
      // grout line
      ctx.fillStyle = GROUT;
      ctx.fillRect(x, y, CELL, CELL);
      // tile face
      ctx.fillStyle = (r+c)%2===0 ? TILE1 : TILE2;
      ctx.fillRect(x+2, y+2, CELL-4, CELL-4);
      // subtle highlight
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(x+3, y+3, CELL-6, 8);
    }
  }
}

function drawCircleImg(imgKey, gx, gy, highlight) {
  const x = gx*CELL, y = gy*CELL;
  if (highlight) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(x+CELL/2, y+CELL/2, CELL/2-1, 0, Math.PI*2);
    ctx.fillStyle = highlight;
    ctx.fill();
    ctx.restore();
  }
  ctx.save();
  ctx.beginPath();
  ctx.arc(x+CELL/2, y+CELL/2, CELL/2-4, 0, Math.PI*2);
  ctx.clip();
  ctx.drawImage(imgs[imgKey], x+4, y+4, CELL-8, CELL-8);
  ctx.restore();
  // border
  ctx.beginPath();
  ctx.arc(x+CELL/2, y+CELL/2, CELL/2-4, 0, Math.PI*2);
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 2.5;
  ctx.stroke();
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawTiles();
  // cheese glow
  drawCircleImg(cheeseKey, cheese.x, cheese.y, 'rgba(255,230,0,0.45)');
  // player glow
  drawCircleImg(mouseKey, player.x, player.y, 'rgba(100,220,255,0.35)');
}

document.addEventListener('keydown', e => {
  if (!alive) return;
  let {x,y} = player;
  if (e.key==='ArrowLeft')  { x = Math.max(0,x-1); e.preventDefault(); }
  if (e.key==='ArrowRight') { x = Math.min(COLS-1,x+1); e.preventDefault(); }
  if (e.key==='ArrowUp')    { y = Math.max(0,y-1); e.preventDefault(); }
  if (e.key==='ArrowDown')  { y = Math.min(ROWS-1,y+1); e.preventDefault(); }
  player = {x,y};
  if (x===cheese.x && y===cheese.y) {
    score++;
    document.getElementById('pts').textContent = score;
    document.getElementById('msg').textContent = '😋 ¡Ñam! +1';
    clearTimeout(nomTimer);
    nomTimer = setTimeout(()=>document.getElementById('msg').textContent='', 600);
    cheese = rnd(player);
  }
  draw();
});

// touch/swipe
let tx, ty;
canvas.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; },{passive:true});
canvas.addEventListener('touchend', e=>{
  if (!alive) return;
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if (Math.abs(dx)<15 && Math.abs(dy)<15) return;
  let {x,y}=player;
  if (Math.abs(dx)>Math.abs(dy)) x=Math.max(0,Math.min(COLS-1,x+(dx>0?1:-1)));
  else y=Math.max(0,Math.min(ROWS-1,y+(dy>0?1:-1)));
  player={x,y};
  if (x===cheese.x && y===cheese.y) {
    score++;
    document.getElementById('pts').textContent = score;
    cheese = rnd(player);
  }
  draw();
},{passive:true});

// Wait for images then start
let loaded = 0;
['A','B'].forEach(k => {
  imgs[k].onload = () => { loaded++; if(loaded===2) init(); };
});
// fallback if already cached
setTimeout(()=>{ if(loaded<2){ loaded=2; init(); } }, 800);
</script>
</body>
</html>
